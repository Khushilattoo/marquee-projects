<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px black solid;
            width: 200px;
            height: 400px;
            background-color: grey;
            margin-top: 20px;
            margin-left: 40%;
            border-radius: 100px;
        }
        .red{
            background: red fixed ;
            border-radius: 50%;
            height: 120px;
            width: 120px;
            border: black solid 2px;
            margin-left: 40px;
            margin-top: 10px;
        }
        
        .yellow{
            background: rgb(255, 255, 0) fixed  ;
            border-radius: 50%;
            border: black solid 2px;
            height: 120px;
            width: 120px;
            margin-left: 40px;
            margin-top: 5px;
        }
        
        .green{
            background: rgb(22, 168, 32) fixed ;
            border-radius: 50%;
            border: black solid 2px;
            height: 120px;
            width: 120px;
            margin-left: 40px;
             margin-top: 5px;
        }
        .stick{
            height: 180px;
            margin-left: 96px;
            margin-top: 7.5px;
            border: black solid 2px;
            width: 8px;
            background-color: grey;
        }
    </style>
</head>

<body>
     <div class="box">
        <div class="red"></div>
        <div class="yellow"></div>
        <div class="green"></div>
        <div class="stick"></div>
     </div>
</body>
</html>
