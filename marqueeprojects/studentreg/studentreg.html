<!DOCTYPE html>
<html lang="en">
<head>
    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="studentreg.css">
    <title>Student Registration Form</title>
</head>
<body>
    <div class="container">
    <!-- Heading -->
    <h1>Student Registration Form</h1>
    
    <!-- Student Form -->
     <form >
        <fieldset>
            <legend><h3>Personal Information</h3></legend>
            <!-- Implicit relation between input n label -->
            <label >
                Name:
                <input type="text" placeholder="John Doe">
            </label>
            <br> <br>
            <!--Explicit relation between input n label  -->
            <label for="email">
                Email Id:
            </label>
            <input type="email" id="email" placeholder="abc@gmail.com">
            <br><br>

            <label for="telephone">
                Phone Number:
            </label>
            <input type="tel" id="telephone" placeholder="838-4486-364">
            <br> <br>
            <label for="dob">
                Date of birth:
            </label>
            <input type="date" id="dob" placeholder="DD-MM-YYYY">
        </fieldset>
        

        <!-- Gender Info -->
        <fieldset>
            <legend><h3>Gender Information</h3></legend>
            <label for="female">
                Female
            </label>
            <input type="radio" id="female" name="genders">
            <br>


            <label for="male">
                Male   
            </label>
            <input type="radio" id="male" name="genders">

        </fieldset>
        <br>

        <!-- Course Info -->
        <fieldset>
            <label for="course">
               Select Course 
            </label>
            <!-- <select id="course" size="2">
                <option>Mern</option>
                <option>DSA</option>
                <option>CN</option>
            </select> -->
            <select id="course"  >
                
                <option disabled selected hidden>Choose an option</option>
                <option>DSA</option>
                <option>CN</option>
            </select>
        </fieldset>
        <br>
        <button type="submit">Submit</button>
     </form>
     </div>
</body>
</html></title>
</head>
