<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
</head>
<body>
    <!-- Header Section -->
     <header>
        <div class="top">
            <i id="menu" class="fa-notdog-duo fa-solid fa-bars"></i>
            <i class="fa-brands fa-youtube" style="color: rgb(248, 38, 3);"></i> 
            <span class="utube">YouTube<sup>IN</sup></span>
            <input class="search" type="text" placeholder="Search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div class="mic"><i class="fa-duotone fa-solid fa-microphone"></i></div>
            <div class="create">
                <div class="plus"><i class="fa-solid fa-plus"></i></div>
                <div class="text">Create</div>
            </div>
            <span class="bell"><i class="fa-regular fa-bell"></i></span>
            <div class="k"><i class="fa-solid fa-k" style="color: rgb(243, 245, 249);"></i></div>
        </div>
        
        <div class="bottom">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
     </header>'
     
     
     <!-- Hero -->
      <section class="hero">
        <div class="thumbnail">
            <div class="image"><img src="https://th.bing.com/th/id/OIP.kyBn0leCkZ4savZolMGXOAHaEK?w=284&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt=""></div>
            <div class="image"><img src="https://th.bing.com/th/id/OIP.MLQK-A5Yz9E8H0Hb8_zOXgHaEK?w=292&h=187&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt=""></div>
            <div class="image"><img src="https://th.bing.com/th/id/OIP.hKQyw0675JhQy1guKtDqWgHaD2?w=325&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt=""></div>
        </div>
      </section>
</body>
</html>
